spring:
  application:
    name: srm-credit-engine

  # H2 em memória
  datasource:
    url: jdbc:h2:mem:srmdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # DESABILITAR REDIS COMPLETAMENTE
  data:
    redis:
      repositories:
        enabled: false
      enabled: false

  cache:
    type: simple

server:
  port: 8080

# DESABILITAR HEALTH CHECK DO REDIS
management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

logging:
  level:
    root: INFO
    org.example.srm: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.data.redis: OFF
    org.springframework.boot.autoconfigure.data.redis: OFF